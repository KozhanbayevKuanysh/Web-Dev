<div class="detail-container">
  <div *ngIf="loading" class="loading">Loading album...</div>
  <div *ngIf="error">{{ error }}</div>

  <div *ngIf="album && !loading && !error">
    <h1>Album #{{ album.id }}</h1>
    <p><strong>User ID:</strong> {{ album.userId }}</p>

    <label>
      Title:
      <input [(ngModel)]="album.title" type="text" />
    </label>

    <div class="actions">
      <button (click)="save()" class="btn primary">Save</button>
      <button (click)="viewPhotos()" class="btn">View Photos</button>
      <button (click)="goBack()" class="btn secondary">Back to List</button>
    </div>
  </div>
</div>
